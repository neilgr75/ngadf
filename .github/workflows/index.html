<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to My Website</title>
    <style>
        /* Reset default browser spacing */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Set up standard font stack and center content layout */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        /* Container box for content presentation */
        .container {
            max-width: 600px;
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        /* Main typographic styles */
        h1 {
            font-size: 2.5rem;
            color: #111111;
            margin-bottom: 16px;
        }

        p {
            font-size: 1.1rem;
            color: #666666;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* Primary action button design */
        .cta-button {
            display: inline-block;
            background-color: #0070f3;
            color: #ffffff;
            text-decoration: none;
            padding: 12px 28px;
            font-weight: 600;
            border-radius: 6px;
            transition: background-color 0.2s ease-in-out;
        }

        .cta-button:hover {
            background-color: #0051a8;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Welcome to My Website</h1>
        <p>This is a basic opening page deployed effortlessly onto Azure Static Web Apps. You can customize this layout by changing the text or editing the embedded CSS styles above.</p>
        <a href="#explore" class="cta-button">Explore Features</a>
    </div>

</body>
</html>
